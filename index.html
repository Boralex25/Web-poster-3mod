<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastime</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="screensaver">
        <img data-js="js-screensaver" src="assets/images/screensaver.svg" alt="">
    </div>

    <title></title>

    <div class="egypt-eye">
        <div data-js="js-egypt-eye" class="egypt-eye-image">
            <img data-js="js-pupil" class="pupil" src="assets/images/pupil.svg" alt="">
        </div>
    </div>

    <div class="eqypt-god">
        <img src="assets/images/egypt-god.svg" alt="">
    </div>

    <div class="eqypt-table">
        <img class="chip" src="assets/images/egypt-chip.svg" alt="">
        <div data-js="cell" data-cell="1"></div>
        <div data-js="cell" data-cell="2"></div>
        <div data-js="cell" data-cell="3"></div>
        <div data-js="cell" data-cell="4"></div>
        <div data-js="cell" data-cell="5"></div>
        <div data-js="cell" data-cell="6"></div>
        <div data-js="cell" data-cell="7"></div>
        <div data-js="cell" data-cell="8"></div>
        <div data-js="cell" data-cell="9"></div>
        <div data-js="cell" data-cell="10"></div>
        <div data-js="cell" data-cell="11"></div>
        <div data-js="cell" data-cell="12"></div>
        <div data-js="cell" data-cell="13"></div>
        <div data-js="cell" data-cell="14"></div>
        <div data-js="cell" data-cell="15"></div>
        <div data-js="cell" data-cell="16"></div>
        <div data-js="cell" data-cell="17"></div>
        <div data-js="cell" data-cell="18"></div>
        <div data-js="cell" data-cell="19"></div>
        <div data-js="cell" data-cell="20"></div>
        <div data-js="cell" data-cell="21"></div>
        <div data-js="cell" data-cell="22"></div>
        <div data-js="cell" data-cell="23"></div>
        <div data-js="cell" data-cell="24"></div>
        <div data-js="cell" data-cell="25"></div>
        <div data-js="cell" data-cell="26"></div>
        <div data-js="cell" data-cell="27"></div>
        <div data-js="cell" data-cell="28"></div>
        <div data-js="cell" data-cell="29"></div>
        <div data-js="cell" data-cell="30"></div>
    </div>

    <div class="eqypt-person">
        <img src="assets/images/human.svg" alt="">
    </div>

    <div class="first-chess-fig">
        <img data-js="js-1fig1var" src="assets/images/1fig1var.svg" alt="">
    </div>
    <div class="second-chess-fig">
        <img data-js="js-2fig1var" src="assets/images/2fig1var.svg" alt="">
    </div>
    <div class="third-chess-fig">
        <img data-js="js-3fig1var" src="assets/images/3fig1var.svg" alt="">
    </div>
    <div class="fourth-chess-fig">
        <img data-js="js-4fig1var" src="assets/images/4fig1var.svg" alt="">
    </div>

    <div class="chess-queen">
        <img data-js="js-queen" src="assets/images/evo-chess-queen.svg" alt="">
    </div>
    <div class="chess-slider">
        <input type="range" data-js="js-slider" min="0" max="100" value="0">
    </div>

    <div class="first-chessboard"></div>
    <div class="second-chessboard"></div>
    <div class="third-chessboard"></div>
    <div class="fourth-chessboard"></div>

    <div class="chess-sword">
        <img src="assets/images/chess-sword.svg" alt="">
    </div>
    <div class="chess-fact">
        <img src="assets/images/chess-fact.svg" alt="">
    </div>
    <div class="dnd-cube">
        <img src="assets/images/dnd-cube-out.svg" style="width: 90%; z-index: 2; pointer-events: none;" alt="">
        <img data-js="js-cube-fact1" src="assets/images/dnd-cube-fact1.svg" alt="">
        <img data-js="js-cube-fact2" src="assets/images/dnd-cube-fact2.svg" alt="">
        <img data-js="js-cube-fact3" src="assets/images/dnd-cube-fact3.svg" alt="">
        <img data-js="js-cube-fact4" src="assets/images/dnd-cube-fact4.svg" alt="">
    </div>

    <div class="dnd-first-fact"></div>
    <div class="dnd-second-fact"></div>
    <div class="dnd-third-fact"></div>
    <div class="dnd-fourth-fact"></div>

    <div class="who-is-mafia">
        <img src="assets/images/who-mafia.svg" alt="">
    </div>
    <div class="jaws">
        <img src="assets/images/upper-jaw.svg" style="top: 22%;" alt="">
        <img data-js="js-lower-jaw" src="assets/images/lower-jaw.svg" style="top: 27%;" alt="">
    </div>

    <div class="first-mafia-card"></div>
    <div class="second-mafia-card"></div>
    <div class="third-mafia-card"></div>

    <div class="monopoly"></div>

    <div class="fact-monopoly">
        <img data-monopoly="js-mn1" src="assets/images/mn1.svg" style="top: -15%;" alt="">
        <img data-monopoly="js-mn2" src="assets/images/mn2.svg" style="top: -15%;" alt="">
        <img data-monopoly="js-mn3" src="assets/images/mn3.svg" style="top: -15%;" alt="">
    </div>

    <div class="monopoly-houses"></div>

    <footer></footer>


    <script src="script.js"></script>
</body>
</html>
